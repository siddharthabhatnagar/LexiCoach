services:
  - type: web
    name: lexicoach-api
    env: docker
    region: ohio
    plan: free # or standard if you need more resources
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexicoach-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lexicoach-redis
          property: connectionString
      # Add other required environment variables here, e.g., MONGO_URL
      # Note: Render does not have managed MongoDB. Use MongoDB Atlas.
      - key: MONGO_URL
        sync: false # Set this in Render dashboard

  - type: worker
    name: lexicoach-celery-worker
    env: docker
    region: ohio
    plan: free # Note: free workers may spin down
    dockerCommand: celery -A celery_app.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexicoach-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lexicoach-redis
          property: connectionString

  - type: worker
    name: lexicoach-celery-beat
    env: docker
    region: ohio
    plan: free
    dockerCommand: celery -A celery_app.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexicoach-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lexicoach-redis
          property: connectionString

  - type: redis
    name: lexicoach-redis
    plan: free
    region: ohio

databases:
  - name: lexicoach-db
    plan: free
    region: ohio
    databaseName: english_app
    user: postgres
